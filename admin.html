<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MR OK Admin - Leads</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="MR OK Financial Services internal admin dashboard for lead management." />
  <link rel="icon" href="/mroklogo.jpeg" type="image/jpeg" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="MR OK Financial Services" />
  <meta property="og:title" content="MR OK Admin - Leads" />
  <meta property="og:description" content="MR OK Financial Services internal admin dashboard for lead management." />
  <meta property="og:url" content="__OG_CANONICAL_URL__" />
  <meta property="og:image" content="__OG_IMAGE_URL__" />
  <meta property="og:image:alt" content="MR OK Financial Services" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="MR OK Admin - Leads" />
  <meta name="twitter:description" content="MR OK Financial Services internal admin dashboard for lead management." />
  <meta name="twitter:image" content="__OG_IMAGE_URL__" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="mx-auto max-w-7xl px-6 py-10">
    <div class="mb-8 flex items-center justify-between">
      <h1 class="text-2xl font-bold">Admin Leads Dashboard</h1>
      <button id="logout-btn" class="rounded-lg border border-slate-700 px-4 py-2 text-sm hover:border-slate-500">Logout</button>
    </div>

    <section id="login-card" class="mx-auto max-w-md rounded-2xl border border-slate-800 bg-slate-900 p-6">
      <h2 class="text-xl font-semibold">Admin Login</h2>
      <form id="login-form" class="mt-5 space-y-4">
        <div>
          <label class="mb-2 block text-sm">Username</label>
          <input id="username" type="text" class="w-full rounded-lg border border-slate-700 bg-slate-950 px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-sky-400/50" required />
        </div>
        <div>
          <label class="mb-2 block text-sm">Password</label>
          <input id="password" type="password" class="w-full rounded-lg border border-slate-700 bg-slate-950 px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-sky-400/50" required />
        </div>
        <button type="submit" class="w-full rounded-lg bg-sky-500 px-4 py-3 text-sm font-semibold text-white hover:bg-sky-400">Login</button>
        <p id="login-message" class="text-sm"></p>
      </form>
    </section>

    <section id="dashboard" class="hidden">
      <div class="mb-4 grid gap-3 rounded-2xl border border-slate-800 bg-slate-900 p-4 md:grid-cols-5">
        <input id="search" type="text" placeholder="Search by name/city/mobile/email..." class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-400/50 md:col-span-2" />
        <input id="from" type="date" class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-400/50" />
        <input id="to" type="date" class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-400/50" />
        <button id="export-btn" class="rounded-lg bg-emerald-500 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-400">Export CSV</button>
      </div>

      <div class="overflow-x-auto rounded-2xl border border-slate-800 bg-slate-900">
        <table class="min-w-full text-left text-sm">
          <thead class="bg-slate-800/80 text-slate-200">
            <tr>
              <th class="px-4 py-3">ID</th>
              <th class="px-4 py-3">Name</th>
              <th class="px-4 py-3">Loan Type</th>
              <th class="px-4 py-3">Amount</th>
              <th class="px-4 py-3">City</th>
              <th class="px-4 py-3">Mobile</th>
              <th class="px-4 py-3">Email</th>
              <th class="px-4 py-3">Created</th>
            </tr>
          </thead>
          <tbody id="leads-tbody"></tbody>
        </table>
      </div>

      <div class="mt-4 flex items-center justify-between">
        <button id="prev-btn" class="rounded-lg border border-slate-700 px-4 py-2 text-sm hover:border-slate-500">Previous</button>
        <p id="page-info" class="text-sm text-slate-300"></p>
        <button id="next-btn" class="rounded-lg border border-slate-700 px-4 py-2 text-sm hover:border-slate-500">Next</button>
      </div>
    </section>
  </main>

  <script>
    const state = {
      page: 1,
      limit: 10,
      totalPages: 1,
    };

    const loginCard = document.getElementById("login-card");
    const dashboard = document.getElementById("dashboard");
    const loginForm = document.getElementById("login-form");
    const loginMessage = document.getElementById("login-message");
    const tbody = document.getElementById("leads-tbody");
    const pageInfo = document.getElementById("page-info");
    const searchInput = document.getElementById("search");
    const fromInput = document.getElementById("from");
    const toInput = document.getElementById("to");
    let liveRefreshTimer = null;

    function toIsoRange(dateStr, endOfDay) {
      if (!dateStr) return "";
      const suffix = endOfDay ? "T23:59:59.999Z" : "T00:00:00.000Z";
      return new Date(dateStr + suffix).toISOString();
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderRows(items) {
      if (!items.length) {
        tbody.innerHTML = "<tr><td class='px-4 py-3 text-slate-400' colspan='8'>No leads found.</td></tr>";
        return;
      }
      tbody.innerHTML = items
        .map((row) => {
          return `
          <tr class="border-t border-slate-800">
            <td class="px-4 py-3">${row.id}</td>
            <td class="px-4 py-3">${escapeHtml(row.name || "-")}</td>
            <td class="px-4 py-3">${escapeHtml(row.loan_type)}</td>
            <td class="px-4 py-3">${escapeHtml(row.loan_amount)}</td>
            <td class="px-4 py-3">${escapeHtml(row.city)}</td>
            <td class="px-4 py-3">${escapeHtml(row.mobile)}</td>
            <td class="px-4 py-3">${escapeHtml(row.email || "-")}</td>
            <td class="px-4 py-3">${new Date(row.created_at).toLocaleString()}</td>
          </tr>
        `;
        })
        .join("");
    }

    async function fetchLeads() {
      const params = new URLSearchParams({
        page: String(state.page),
        limit: String(state.limit),
      });
      if (searchInput.value.trim()) params.set("q", searchInput.value.trim());
      if (fromInput.value) params.set("from", toIsoRange(fromInput.value, false));
      if (toInput.value) params.set("to", toIsoRange(toInput.value, true));

      const response = await fetch(`/api/admin/leads?${params.toString()}`, {
        credentials: "include",
      });

      if (response.status === 401) {
        dashboard.classList.add("hidden");
        loginCard.classList.remove("hidden");
        return;
      }

      const data = await response.json();
      state.totalPages = data.totalPages || 1;
      renderRows(data.items || []);
      pageInfo.textContent = `Page ${state.page} of ${state.totalPages} (Total: ${data.total || 0})`;
    }

    async function checkAuth() {
      const response = await fetch("/api/admin/me", { credentials: "include" });
      const data = await response.json();
      if (data.authenticated) {
        loginCard.classList.add("hidden");
        dashboard.classList.remove("hidden");
        await fetchLeads();
        if (!liveRefreshTimer) {
          liveRefreshTimer = setInterval(fetchLeads, 10000);
        }
      }
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const body = {
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value,
      };

      const response = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify(body),
      });
      const data = await response.json();
      if (!response.ok) {
        loginMessage.textContent = data.message || "Login failed";
        loginMessage.className = "text-sm text-red-300";
        return;
      }
      loginMessage.textContent = "";
      loginCard.classList.add("hidden");
      dashboard.classList.remove("hidden");
      state.page = 1;
      await fetchLeads();
      if (!liveRefreshTimer) {
        liveRefreshTimer = setInterval(fetchLeads, 10000);
      }
    });

    document.getElementById("logout-btn").addEventListener("click", async () => {
      await fetch("/api/admin/logout", { method: "POST", credentials: "include" });
      dashboard.classList.add("hidden");
      loginCard.classList.remove("hidden");
      tbody.innerHTML = "";
      if (liveRefreshTimer) {
        clearInterval(liveRefreshTimer);
        liveRefreshTimer = null;
      }
    });

    document.getElementById("prev-btn").addEventListener("click", async () => {
      if (state.page <= 1) return;
      state.page -= 1;
      await fetchLeads();
    });

    document.getElementById("next-btn").addEventListener("click", async () => {
      if (state.page >= state.totalPages) return;
      state.page += 1;
      await fetchLeads();
    });

    [searchInput, fromInput, toInput].forEach((el) => {
      el.addEventListener("change", async () => {
        state.page = 1;
        await fetchLeads();
      });
    });

    searchInput.addEventListener("keyup", async (event) => {
      if (event.key === "Enter") {
        state.page = 1;
        await fetchLeads();
      }
    });

    document.getElementById("export-btn").addEventListener("click", () => {
      const params = new URLSearchParams();
      if (searchInput.value.trim()) params.set("q", searchInput.value.trim());
      if (fromInput.value) params.set("from", toIsoRange(fromInput.value, false));
      if (toInput.value) params.set("to", toIsoRange(toInput.value, true));
      window.location.href = `/api/admin/leads/export.csv?${params.toString()}`;
    });

    checkAuth();
  </script>
</body>
</html>
